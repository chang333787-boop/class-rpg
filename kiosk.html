<title>우리반 할 일 체크판</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0d1b2a;
  --bg2: #162032;
  --bg3: #1e2d42;
  --border: rgba(255,255,255,.1);
  --txt: #e8edf2;
  --txt2: #8fa3b8;
  --gold: #FFD700;
  --emerald: #2ECC71;
  --red: #E74C3C;
  --sky: #5DADE2;
}
html, body {
  width:100%;
  height:auto;
  background:var(--bg);
  color:var(--txt);
  font-family:'Noto Sans KR',sans-serif;
  overflow-x:hidden;
  overflow-y:auto;
}

/* ── 로딩 ── */
#loading {
  position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
}
@keyframes ldBar{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}

/* ── 상단 헤더 ── */
#header {
  height:48px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 1rem;gap:.8rem;flex-shrink:0;
}
#header .title { font-size:1rem;font-weight:900;color:var(--gold); }
#header .date  { font-size:.78rem;color:var(--txt2);margin-left:auto; }

/* ── 메인 레이아웃 ── */
#main-wrap {
  display:flex;
  flex-direction:column;
  width:100%;
  height:100vh;
  height:100dvh;
  overflow:hidden;
}

/* ── 탭 ── */
#tabs {
  display:flex;gap:.4rem;padding:.6rem 1rem;background:var(--bg2);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.qtab {
  padding:.4rem 1rem;border-radius:20px;border:1.5px solid var(--border);
  background:transparent;color:var(--txt2);font-size:.85rem;font-weight:700;
  cursor:pointer;transition:all .2s;font-family:inherit;
}
.qtab.on { background:var(--gold);color:#1a1a1a;border-color:var(--gold); }

/* ── 테이블 영역 ── */
#table-wrap {
  padding:.6rem .8rem 8rem;
  width:100%;
  box-sizing:border-box;
}
#kiosk-table {
  width:max-content;min-width:100%;border-collapse:collapse;
}
#kiosk-table th {
  padding:.5rem .4rem;text-align:center;font-size:.75rem;font-weight:700;
  background:var(--bg3);border:1px solid var(--border);
  position:sticky;top:0;z-index:10;white-space:nowrap;
}
#kiosk-table th.quest-th {
  text-align:left;padding:.5rem .8rem;width:180px;min-width:150px;
  font-size:.8rem;
}
#kiosk-table td {
  border:1px solid var(--border);text-align:center;
  padding:.2rem;vertical-align:middle;min-width:52px;
}
#kiosk-table td.quest-name {
  text-align:left;padding:.5rem .8rem;background:var(--bg2);
  font-size:.82rem;font-weight:600;position:sticky;left:0;z-index:5;
}
#kiosk-table td.quest-name .quest-reward {
  font-size:.68rem;color:var(--gold);font-weight:400;margin-top:.15rem;
}
#kiosk-table tr:hover td { background:rgba(255,255,255,.02); }

/* ── 셀 버튼 ── */
.cell-btn {
  width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,.15);
  background:transparent;cursor:pointer;font-size:.7rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;margin:0 auto;
  transition:all .2s;color:var(--txt2);flex-direction:column;gap:1px;
  -webkit-tap-highlight-color:rgba(255,215,0,.2);touch-action:manipulation;
}
.cell-btn:hover { border-color:var(--gold);transform:scale(1.1); }
.cell-btn.pending {
  background:rgba(255,215,0,.15);border-color:var(--gold);color:var(--gold);
  animation:pendingPulse 2s ease-in-out infinite;
}
.cell-btn.done {
  background:rgba(46,204,113,.15);border-color:var(--emerald);color:var(--emerald);
  cursor:default;
}
@keyframes pendingPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.0)}50%{box-shadow:0 0 0 4px rgba(255,215,0,.2)}}

/* ── 빈 화면 ── */
#empty-msg {
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:calc(100vh - 130px);color:var(--txt2);gap:.8rem;
}

/* ── 토스트 ── */
#toast {
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  background:#1e2d42;border:1px solid var(--gold);color:var(--gold);
  padding:.7rem 1.5rem;border-radius:20px;font-size:.9rem;font-weight:700;
  z-index:9999;display:none;pointer-events:none;
}

/* ── 취소 확인 팝업 ── */
#cancel-popup {
  display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.6);
  align-items:center;justify-content:center;
}
#cancel-popup .popup-box {
  background:var(--bg2);border:1.5px solid var(--border);border-radius:20px;
  padding:1.5rem;text-align:center;max-width:320px;width:90%;
}
#cancel-popup .popup-title { font-size:1rem;font-weight:700;margin-bottom:.5rem; }
#cancel-popup .popup-sub   { font-size:.82rem;color:var(--txt2);margin-bottom:1.2rem; }
#cancel-popup .popup-btns  { display:flex;gap:.6rem; }
#cancel-popup .popup-btns button {
  flex:1;padding:.6rem;border-radius:10px;border:none;
  font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

<!-- 로딩 -->
<div id="loading">

  <div style="width:180px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:.5rem;overflow:hidden">
    <div style="width:40%;height:100%;background:var(--gold);border-radius:2px;animation:ldBar 1.2s ease-in-out infinite"></div>
  </div>

</div>

<!-- 메인 -->

    </div>
    <div class="date" id="today-date"></div>
  </div>
  <!-- 퀘스트 탭 -->
  <div id="table-wrap" style="flex:1;overflow-y:auto;overflow-x:auto;padding:.6rem .8rem 8rem;-webkit-overflow-scrolling:touch;min-height:0">
    <div id="kiosk-content"></div>
  </div>
  <!-- 감정 탭 -->

  </div>
</div>

<div id="toast"></div>

// ─── Firebase DB (실시간 동기화) ──────────────────────
const DB = {
  KEY: 'classRPG_v3',
  ADMIN_KEY: 'classRPG_adminPw',
  _cache: null,
  _fbRef: null,
  _fbAdminRef: null,
  _onChangeCb: null,
  _saving: false,

  async init() {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    this._fbRef = firebase.database().ref(this.KEY);
    this._fbAdminRef = firebase.database().ref(this.ADMIN_KEY);

    // 초기 데이터 로드
    const snap = await this._fbRef.once('value');
    let data = snap.val();

    if (!data) {
      data = this._defaultData();
      await this._fbRef.set(data);
    }
    this._cache = this._migrate(this._normalizeArrays(data));

    // 실시간 동기화 리스너 — 다른 기기 변경사항 반영
    this._fbRef.on('value', (snap) => {
      if (this._saving) return; // 내가 저장 중일 때는 무시
      const d = snap.val();
      if (d) {
        this._cache = this._migrate(this._normalizeArrays(d));
        if (this._onChangeCb) this._onChangeCb();
      }
    });
  },

  onDataChange(fn) { this._onChangeCb = fn; },

  _defaultData() {
    return {
      students: JSON.parse(JSON.stringify(GAME_DATA.defaultStudents)),
      quests: [], promotionRequests: [], boardQuests: [],
      artworks: [], pwResetRequests: [],
      settings: {
        className:'우리반', bossActive:false, bossName:'거대 트롤',
        bossIcon:'🧌', bossGold:150, monsterWinRate:80,
        baseExp:80, baseGold:50, monsterDailyLimit:2,
      }
    };
  },

  // Firebase는 배열을 객체로 저장 → 다시 배열로 변환
  _normalizeArrays(data) {
    const toArr = v => v == null ? [] : Array.isArray(v) ? v : Object.values(v);
    data.students          = toArr(data.students).map(s => {
      if (!s) return null;
      s.farm             = toArr(s.farm);
      s.inventory        = toArr(s.inventory);
      s.books            = toArr(s.books);
      s.houseDecorations = toArr(s.houseDecorations);
      s.achievements     = toArr(s.achievements);
      s.titles           = toArr(s.titles);
      s.monsterLog       = toArr(s.monsterLog);
      s.pendingRewards   = toArr(s.pendingRewards);
      return s;
    }).filter(Boolean);
    // 중복 학생 제거 (같은 id가 여러 번 있을 경우 마지막 것 유지)
    const seen = new Map();
    data.students.forEach(s => seen.set(s.id, s));
    data.students = Array.from(seen.values());
    // questLogs가 완료 판정의 단일 소스 (quests 배열 인덱스 충돌 방지)
    data.quests = Object.values(data.questLogs || {})
      .filter(q => q != null && typeof q === 'object' && q.studentId);
    data.promotionRequests  = toArr(data.promotionRequests);
    data.boardQuests        = toArr(data.boardQuests);
    data.artworks           = toArr(data.artworks);
    data.pwResetRequests    = toArr(data.pwResetRequests);
    // emotionLogs는 키 기반 객체 유지 (배열 변환 금지)
    if (Array.isArray(data.emotionLogs)) data.emotionLogs = {};
    data.emotionLogs = data.emotionLogs || {};
    return data;
  },

  _migrate(data) {
    data.students = data.students.map(s => {
      if (s.stats && s.stats.moral !== undefined && s.stats.value === undefined) {
        s.stats.value = s.stats.moral; delete s.stats.moral;
      }
      return {
        books:[], equipmentIds:{}, promotionPending:false,
        lastMonsterDate:'', monsterDailyCount:0,
        houseDecorations:[], achievements:[], farmHarvests:0,
        ...s,
        houseDecorations: (s.houseDecorations||[]).map(p => {
          if (p.row !== undefined && p.col !== undefined) return p;
          const area = p.area || 'yard';
          const oldCols = area==='yard' ? 5 : 3;
          const slot = p.slot || 0;
          return {id:p.id, area, row:Math.floor(slot/oldCols), col:slot%oldCols};
        }),
      };
    });
    return data;
  },

  load() { return this._cache; },

  save(data) {
    this._cache = data;
    this._saving = true;
    this._fbRef.set(data).finally(() => {
      setTimeout(() => { this._saving = false; }, 500);
    });
  },

  // ── 부분 저장 (충돌 방지) ──
  saveStudent(student) {
    const db = this.load();
    const idx = db.students.findIndex(s => s.id === student.id);
    if (idx >= 0) db.students[idx] = student; else db.students.push(student);
    this._cache = db;
    this._saving = true;
    // id 키 기반 저장 (인덱스 충돌 방지)
    this._fbRef.child('students/' + student.id).set(student).finally(() => {
      setTimeout(() => { this._saving = false; }, 500);
    });
  },

  saveQuestLog(log) {
    const db = this.load();
    db.quests = db.quests || [];
    db.quests.push(log);
    this._cache = db;
    // questLogs에 고유 키로 저장 (완료 판정 기준)
    const logId = log.studentId + '_' + (log.boardQuestId||'manual') + '_' + Date.now();
    log._id = logId;
    this._fbRef.child('questLogs/' + logId).set(log);
  },

  saveArtwork(artwork) {
    const db = this.load();
    db.artworks = db.artworks || [];
    // 필드명 통일: title/comment/subject 기준으로 저장
    const normalized = {
      ...artwork,
      title:   artwork.title   || artwork.artTitle || '',
      comment: artwork.comment || artwork.artDesc  || '',
      subject: artwork.subject || '',
    };
    db.artworks.push(normalized);
    this._cache = db;
    this._fbRef.child('artworks/' + normalized.id).set(normalized);
  },

  updateArtwork(id, patch) {
    const db = this.load();
    const idx = (db.artworks||[]).findIndex(a => a.id === id);
    if (idx < 0) return false;
    db.artworks[idx] = { ...db.artworks[idx], ...patch };
    this._cache = db;
    this._saving = true;
    return this._fbRef.child('artworks/' + id).set(db.artworks[idx]).finally(() => {
      setTimeout(() => { this._saving = false; }, 300);
    });
  },

  getStudents()    { return this.load().students; },
  getStudent(id)   { return this.load().students.find(s => s.id === id); },

  getSettings()    { return this.load().settings; },
  saveSettings(s)  { const db = this.load(); db.settings = s; this.save(db); },

  getQuests()      { return this.load().quests || []; },
  addQuest(q)      { const db = this.load(); db.quests = [...(db.quests||[]), q]; this.save(db); },

  getPromotionRequests()     { return this.load().promotionRequests || []; },
  addPromotionRequest(r) {
    const db = this.load();
    db.promotionRequests = db.promotionRequests || [];
    // 중복 차단: 동일 studentId + level
    const exists = db.promotionRequests.some(x => x && x.studentId === r.studentId && Number(x.level) === Number(r.level));
    if (exists) return false;
    db.promotionRequests.push(r);
    this.save(db);
    return true;
  },
  removePromotionRequest(id) { const db = this.load(); db.promotionRequests = (db.promotionRequests||[]).filter(r=>r.id!==id); this.save(db); },

  async getAdminPw() {
    const snap = await this._fbAdminRef.once('value');
    return snap.val() || 'teacher1234';
  },
  setAdminPw(pw) { this._fbAdminRef.set(pw); },

  getArtworks(studentId) { return (this.load().artworks||[]).filter(a => a.studentId === studentId); },
  addArtwork(a)          { const db=this.load(); db.artworks=[...(db.artworks||[]),a]; this.save(db); },

const Utils = {

  levelFromExp(exp) {
    const t = GAME_DATA.expTable;
    for (let i = t.length - 1; i >= 0; i--) { if (exp >= t[i]) return i + 1; }
    return 1;
  },
  expForLevel(lv)    { return GAME_DATA.expTable[Math.min(lv-1, GAME_DATA.expTable.length-1)]; },
  expForNextLevel(lv){ return GAME_DATA.expTable[Math.min(lv,   GAME_DATA.expTable.length-1)]; },

  expPct(s) {
    const cur  = s.exp - this.expForLevel(s.level);
    const need = this.expForNextLevel(s.level) - this.expForLevel(s.level);
    if (need <= 0) return 100;
    return Math.max(0, Math.min(100, (cur / need) * 100));
  },

  // ★ 장비 장착: 이전 스탯 제거 후 새 스탯 적용
  equipItem(student, item) {
    const slot = GAME_DATA.getSlotForItem(item.id);
    if (!slot) return;
    student.equipmentIds = student.equipmentIds || {};
    student.combat = student.combat || {};
    const oldId = student.equipmentIds[slot];
    if (oldId) {
      const old = GAME_DATA.getItemById(oldId);
      if (old) Object.entries(old.stats).forEach(([k,v]) => {
        student.combat[k] = Math.max(0, (student.combat[k]||0) - v);
      });
    }
    student.equipmentIds[slot] = item.id;
    student.equipment = student.equipment || {};
    student.equipment[slot] = item.name;
    Object.entries(item.stats).forEach(([k,v]) => {
      student.combat[k] = (student.combat[k]||0) + v;
    });
  },

  cropReady(planted, growHours)    { return Date.now() - planted >= growHours * 3600000; },
  cropProgress(planted, growHours) { return Math.min(100, ((Date.now()-planted)/(growHours*3600000))*100); },

  getSeedById(id)    { return GAME_DATA.seeds.find(s => s.id === id); },
  getSeedByCrop(crop){ return GAME_DATA.seeds.find(s => s.crop === crop); },

  condMet(student, cond) {
    return Object.entries(cond).every(([stat,val]) => (student.stats[stat]||0) >= val);
  },
  condText(cond) {
    const n = GAME_DATA.statNames;
    return Object.entries(cond).map(([s,v]) => `${n[s]||s} ${v}`).join(' + ') || '조건 없음';
  },
  statText(stats) {
    const n = GAME_DATA.combatNames;
    return Object.entries(stats).map(([s,v]) => `${n[s]||s} +${v}`).join(' · ');
  },

  charEmoji(type)       { return {1:'🧑‍🦱',2:'👧',3:'🧑',4:'👩'}[type]||'🧑'; },
  isPromotionLevel(lv)  { return GAME_DATA.promotionLevels.includes(lv); },

  // ★ 공용 퀘스트 상태 계산 (관리자/학생/키오스크 3화면 공통)
  // 반환값: 'done' | 'pending' | 'none'
  questStatus(studentId, questId, questType, questLogs, pendingRewards, activeBoardQuestIds) {
    // 삭제된 boardQuest 참조는 무시
    if (activeBoardQuestIds && !activeBoardQuestIds.has(questId)) return 'none';

    // 완료 판정
    const done = this.isQuestDoneToday(questLogs, studentId, questId, questType);
    if (done) return 'done';

    // 승인된 pending도 done 취급
    const approved = (pendingRewards||[]).some(r=>
      r && r.boardQuestId===questId && r.approved===true
    );
    if (approved) return 'done';

    // 대기중
    const pending = (pendingRewards||[]).some(r=>
      r && r.boardQuestId===questId && !r.approved
    );
    if (pending) return 'pending';

    return 'none';
  },

  // 장래희망 + 레벨로 직업명 생성
  getJobTitle(dream, level) {
    if (!dream) dream = '직장인';
    // 장래희망에서 핵심 단어 추출
    const core = dream
      .replace(/미래의?\s*/,'').replace(/꿈꾸는\s*/,'').replace(/되고싶은\s*/,'')
      .replace(/장래희망\s*/,'').replace(/최고의\s*/,'').trim() || dream;

    if (level < 5)  return '초등학생';
    if (level < 10) return '중학생';
    if (level < 15) return '고등학생';
    if (level < 20) return '대학생';
    if (level < 25) return `${core} 지망생`;
    if (level < 30) return core;
    return `위대한 ${core}`;
  },
  todayStr() {
    // KST(UTC+9) 기준 날짜
    return new Date(Date.now()+9*3600000).toISOString().slice(0,10);
  },
  weekStartStr() {
    // KST 기준 이번 주 일요일 (일요일 자정 리셋)
    const d = new Date(Date.now()+9*3600000);
    const day = d.getUTCDay(); // 0=일, 1=월 ...
    const sun = new Date(d);
    sun.setUTCDate(d.getUTCDate() - day); // 이번 주 일요일
    return sun.toISOString().slice(0,10);
  },
  isQuestDoneToday(quests, studentId, boardQuestId, questType) {
    const today = this.todayStr();
    const weekStart = this.weekStartStr();
    return (quests||[]).some(q => {
      if (q.studentId!==studentId || q.boardQuestId!==boardQuestId) return false;
      if (!q.date) return true;
      if (questType==='daily')  return q.date===today;
      if (questType==='weekly') return q.date>=weekStart;
      return true;
    });
  },
  uid()                 { return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); },

  // ★ 몬스터 하루 도전 횟수 체크 (2회)
  canFightMonster(student) {
    const settings = DB.getSettings();
    const limit = settings.monsterDailyLimit || 2;
    if ((student.lastMonsterDate||'') !== this.todayStr()) return true;
    return (student.monsterDailyCount||0) < limit;
  },
  monsterAttemptsLeft(student) {
    const settings = DB.getSettings();
    const limit = settings.monsterDailyLimit || 2;
    if ((student.lastMonsterDate||'') !== this.todayStr()) return limit;
    return Math.max(0, limit - (student.monsterDailyCount||0));
  },
};

const AchievementUtils = {
  // 학생의 새 업적 체크 → 새로 달성한 업적 배열 반환
  checkNew(student) {
    const earned = new Set(student.achievements || []);
    const newOnes = [];
    ACHIEVEMENTS.forEach(a => {
      if (!earned.has(a.id) && a.check(student)) {
        earned.add(a.id);
        newOnes.push(a);
      }
    });
    if (newOnes.length > 0) {
      student.achievements = [...earned];
      // 보상 지급
      newOnes.forEach(a => {
        student.exp  = (student.exp||0)  + (a.reward.exp||0);
        student.gold = (student.gold||0) + 20; // 업적 달성 보너스 골드
        if (a.reward.title && !(student.titles||[]).includes(a.reward.title)) {
          student.titles = [...(student.titles||[]), a.reward.title];
          if (!student.title) student.title = a.reward.title;
        }
        // 장식 보상 인벤토리 추가
        if (a.reward.deco) {
          student.inventory = student.inventory || [];
          const ex = student.inventory.find(i => i.id === a.reward.deco);
          if (ex) ex.qty++; else student.inventory.push({ id: a.reward.deco, qty: 1 });
        }
      });
      student.level = Utils.levelFromExp(student.exp);
    }
    return newOnes;
  },

  // 업적 진행도 (0~1)
  progress(student, ach) {
    try { return ach.check(student) ? 1 : 0; } catch(e) { return 0; }
  },
};

function getActiveMonsters(db) {
  const d = db || (typeof DB !== 'undefined' ? DB.load() : {});
  const customs = d.customMonsters || {};
  const base = GAME_DATA.monsters.map(m => {
    const ov = customs[m.id];
    return ov ? { ...m, ...ov } : m;
  });
  const added = Object.values(customs).filter(c => c && c._new);
  return [...base, ...added].sort((a,b) => (a.recLv||0)-(b.recLv||0));
}

// ── 상점 오버라이드 ────────────────────────────────────────
// DB settings.shopOverrides 값으로 GAME_DATA 실제 값을 패치
// 관리자/학생/키오스크 모두 동일한 GAME_DATA를 읽으므로 자동 반영
function applyShopOverrides(db) {
  const d = db || (typeof DB !== 'undefined' ? DB.load() : {});
  const ov = (d.settings || {}).shopOverrides || {};

  // 씨앗
  if (ov.seeds) {
    GAME_DATA.seeds.forEach(s => {
      const patch = ov.seeds[s.id];
      if (!patch) return;
      if (patch.price     !== undefined) s.price     = patch.price;
      if (patch.sellPrice !== undefined) s.sellPrice = patch.sellPrice;
      if (patch.growHours !== undefined) s.growHours = patch.growHours;
    });
  }

  // 장비 (전 슬롯)
  if (ov.equipment) {
    Object.values(GAME_DATA.equipment).forEach(slot => {
      slot.forEach(item => {
        const patch = ov.equipment[item.id];
        if (!patch) return;
        if (patch.price !== undefined) item.price = patch.price;
        if (patch.lv    !== undefined) item.lv    = patch.lv;
        if (patch.stats) Object.assign(item.stats, patch.stats);
      });
    });
  }

  // 장식
  if (ov.decorations) {
    GAME_DATA.decorations.forEach(d => {
      const patch = ov.decorations[d.id];
      if (!patch) return;
      if (patch.price !== undefined) d.price = patch.price;
    });
  }
}

// score = groupValue × level
function calcEmotionScore(emotionKey, level) {
  const e = EMOTION_DATA.find(x => x.key === emotionKey);
  if (!e) return 0;
  return EMOTION_GROUP_VALUE[e.group] * level;
}

// ── DB 감정 함수 ──────────────────────────────────
// key 고정 구조: studentId_date_period → 중복 불가
const DB_EMOTION = {
  _ref(db) {
    return (typeof DB !== 'undefined' ? DB._fbRef : null);
  },

  // 저장 (있으면 덮어쓰기)
  save(studentId, date, period, emotionKey, level, reason) {
    const key = `${studentId}_${date}_${period}`;
    const e = EMOTION_DATA.find(x => x.key === emotionKey);
    if (!e) return;
    const record = {
      id:           key,
      studentId,
      date,
      period,           // 'am' | 'pm'
      emotionKey,
      emotionLabel:  e.label,
      emotionIcon:   e.icon,
      group:         e.group,
      level,            // 1~3
      levelLabel:    EMOTION_LEVEL.find(x=>x.value===level)?.label || '',
      score:         calcEmotionScore(emotionKey, level),
      reason:        reason || '',
      updatedAt:     Date.now(),
    };
    // 캐시 갱신
    const db = (typeof DB !== 'undefined') ? DB.load() : {};
    db.emotionLogs = db.emotionLogs || {};
    db.emotionLogs[key] = record;
    if (typeof DB !== 'undefined') {
      DB._cache = db;
      DB._fbRef.child('emotionLogs/' + key).set(record);
    }
    return record;
  },

  // 단건 조회
  get(studentId, date, period) {
    const key = `${studentId}_${date}_${period}`;
    const db = (typeof DB !== 'undefined') ? DB.load() : {};
    return (db.emotionLogs || {})[key] || null;
  },

  // 날짜별 전체 조회
  getByDate(date) {
    const db = (typeof DB !== 'undefined') ? DB.load() : {};
    return Object.values(db.emotionLogs || {}).filter(r => r && r.date === date);
  },

  // 학생별 전체 조회
  getByStudent(studentId) {
    const db = (typeof DB !== 'undefined') ? DB.load() : {};
    return Object.values(db.emotionLogs || {})
      .filter(r => r && r.studentId === studentId)
      .sort((a,b) => a.date.localeCompare(b.date));
  },

  // 주간 요약 (보상 계산용)
  getWeeklySummary(studentId, weekStart) {
    const records = this.getByStudent(studentId)
      .filter(r => r.date >= weekStart);
    return {
      total:      records.length,
      amCount:    records.filter(r => r.period==='am').length,
      pmCount:    records.filter(r => r.period==='pm').length,
      reasonCount:records.filter(r => r.reason && r.reason !== '없음').length,
      avgScore:   records.length ? (records.reduce((s,r)=>s+r.score,0)/records.length).toFixed(2) : 0,
    };
  },
};

  },
];

// 이번 주에 수령 가능한 감정 보상 목록 반환
function getClaimableEmotionRewards(student, weekStart) {
  const summary = DB_EMOTION.getWeeklySummary(student.id, weekStart);
  const claimed  = (student.emotionRewardsClaimed || {})[weekStart] || [];
  const cfg = ((typeof DB !== 'undefined' ? DB.load() : {}).settings || {}).emotionRewards || {};
  const thresholds = {
    emo_participate: cfg.participate || 4,
    emo_steady:      cfg.steady      || 8,
    emo_reflect:     cfg.reflect     || 3,
  };
  const rewards = {
    emo_participate: { exp: cfg.participateExp  || 20, gold: cfg.participateGold || 15 },
    emo_steady:      { exp: cfg.steadyExp       || 50, gold: cfg.steadyGold      || 40 },
    emo_reflect:     { exp: cfg.reflectExp      || 30, gold: cfg.reflectGold     || 20 },
  };
  return EMOTION_REWARDS.filter(r => {
    if (claimed.includes(r.id)) return false;
    if (r.id === 'emo_participate') return summary.total >= thresholds.emo_participate;
    if (r.id === 'emo_steady')      return summary.total >= thresholds.emo_steady;
    if (r.id === 'emo_reflect')     return summary.reasonCount >= thresholds.emo_reflect;
    return r.condition(summary);
  }).map(r => {
    const thresh = thresholds[r.id];
    const rwd    = rewards[r.id] || { exp: r.exp, gold: r.gold };
    let desc = r.desc;
    if (r.id === 'emo_participate') desc = `이번 주 감정 ${thresh}회 이상 기록`;
    if (r.id === 'emo_steady')      desc = `이번 주 감정 ${thresh}회 이상 기록`;
    if (r.id === 'emo_reflect')     desc = `이번 주 이유 ${thresh}회 이상 입력`;
    return { ...r, desc, exp: rwd.exp, gold: rwd.gold, summary };
  });
}

// 팝업 후보 감정 선택
function getReflectionCandidate(studentId) {
  const db = (typeof DB !== 'undefined') ? DB.load() : {};
  const logs = db.emotionLogs || {};
  const today = (typeof Utils !== 'undefined') ? Utils.todayStr()
    : new Date(Date.now()+9*3600000).toISOString().slice(0,10);

  // 2~7일 사이 기록 (오늘 제외)
  const candidates = Object.values(logs).filter(r => {
    if (!r || r.studentId !== studentId) return false;
    if (r.date === today) return false;
    const diff = (new Date(today) - new Date(r.date)) / 86400000;
    return diff >= 1 && diff <= 7;
  });
  if (!candidates.length) return null;

  // 이미 사용한 기록 제외
  const reflections = db.emotionReflections || {};
  const usedIds = new Set(
    Object.values(reflections)
      .filter(r => r && r.studentId === studentId)
      .map(r => r.promptSourceId)
  );

  // 부정 감정 우선, 이유 있는 것 우선
  const available = candidates.filter(r => !usedIds.has(r.id));
  if (!available.length) return null;

  available.sort((a, b) => {
    const gScore = {negative:2, neutral:1, positive:0};
    const gs = (gScore[b.group]||0) - (gScore[a.group]||0);
    if (gs !== 0) return gs;
    const hasReasonA = a.reason && a.reason !== '없음' ? 1 : 0;
    const hasReasonB = b.reason && b.reason !== '없음' ? 1 : 0;
    return hasReasonB - hasReasonA;
  });

  return available[0];
}

// 팝업 노출 가능 여부 체크
function canShowReflectionPopup(studentId) {
  const db = (typeof DB !== 'undefined') ? DB.load() : {};
  const today = (typeof Utils !== 'undefined') ? Utils.todayStr()
    : new Date(Date.now()+9*3600000).toISOString().slice(0,10);
  const weekStart = (typeof Utils !== 'undefined') ? Utils.weekStartStr()
    : today.slice(0,8)+'01';

  const stats = (db.emotionPromptStats || {})[studentId] || {};

  // 오늘 이미 했으면 금지
  if (stats.lastShownDate === today) return false;
  // 이번 주 2회 이상이면 금지
  if ((stats.weekCount || {})[weekStart] >= 2) return false;
  // 감정 기록 3개 이상이어야
  const logCount = Object.values(db.emotionLogs || {})
    .filter(r => r && r.studentId === studentId).length;
  if (logCount < 3) return false;

  return true;
}

// 팝업 통계 업데이트
function updateReflectionStats(studentId, type) {
  const db = (typeof DB !== 'undefined') ? DB.load() : {};
  const today = (typeof Utils !== 'undefined') ? Utils.todayStr()
    : new Date(Date.now()+9*3600000).toISOString().slice(0,10);
  const weekStart = (typeof Utils !== 'undefined') ? Utils.weekStartStr()
    : today.slice(0,8)+'01';

  db.emotionPromptStats = db.emotionPromptStats || {};
  db.emotionPromptStats[studentId] = db.emotionPromptStats[studentId] || {};
  const stats = db.emotionPromptStats[studentId];

  if (type !== 'later') {
    stats.lastShownDate = today;
    stats.weekCount = stats.weekCount || {};
    stats.weekCount[weekStart] = (stats.weekCount[weekStart] || 0) + 1;
  } else {
    stats.lastShownDate = today; // later도 오늘은 재노출 금지
  }

  if (typeof DB !== 'undefined') {
    DB._cache = db;
    DB._fbRef.child('emotionPromptStats/' + studentId).set(stats);
  }
}

// Reflection 저장
function saveEmotionReflection(studentId, candidate, responseType, responseText, teacherRequest) {
  const db = (typeof DB !== 'undefined') ? DB.load() : {};
  const today = (typeof Utils !== 'undefined') ? Utils.todayStr()
    : new Date(Date.now()+9*3600000).toISOString().slice(0,10);
  const weekStart = (typeof Utils !== 'undefined') ? Utils.weekStartStr()
    : today.slice(0,8)+'01';
  const key = `${studentId}_${today}_${Date.now()}`;

  const record = {
    id: key,
    studentId,
    promptSourceId:    candidate.id,
    promptDate:        candidate.date,
    promptPeriod:      candidate.period,
    promptEmotionKey:  candidate.emotionKey,
    promptEmotionLabel:candidate.emotionLabel,
    promptEmotionGroup:candidate.group,
    promptEmotionScore:candidate.score,
    promptReason:      candidate.reason || '',
    responseType,
    responseText:      responseText || '',
    teacherRequest:    !!teacherRequest,
    createdAt:         Date.now(),
    weekKey:           weekStart,
  };

  if (typeof DB !== 'undefined') {
    db.emotionReflections = db.emotionReflections || {};
    db.emotionReflections[key] = record;
    DB._cache = db;
    DB._fbRef.child('emotionReflections/' + key).set(record);

    // 관리자 알림
    if (teacherRequest) {
      const student = DB.getStudent(studentId);
      DB._fbRef.child('emotionAlerts/' + key).set({
        ...record,
        studentName: student?.name || '',
        studentAvatar: student?.avatar || '',
        read: false,
      });
    }
  }
  return record;
}

<script>
// ── Firebase ──
// FIREBASE_CONFIG는 gamedata.js에서 선언됨

let DB_DATA = null;
let CUR_TAB = 'daily';
let fbRef = null;
let _cancelCb = null;

function toArr(v) {
  return v == null ? [] : Array.isArray(v) ? v : Object.values(v);
}

function todayStr() {
  return new Date(Date.now()+9*3600000).toISOString().slice(0,10);
}

// ── 초기화 ──
window.onload = async () => {
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  fbRef = firebase.database().ref('classRPG_v3');

  try {
    const snap = await fbRef.once('value');
    DB_DATA = normalizeData(snap.val());
    if (!DB_DATA) { alert('데이터가 없습니다. 관리자에서 먼저 설정해주세요.'); return; }

    // 실시간 동기화 — 디바운스로 연속 업데이트 묶어서 처리
    let _renderTimer = null;
    fbRef.on('value', snap => {
      DB_DATA = normalizeData(snap.val());
      if (_renderTimer) clearTimeout(_renderTimer);
      _renderTimer = setTimeout(() => {
        if (KIOSK_TAB === 'emotion') renderEmotionBoard();
        else renderTable();
      }, 400);
    });

    document.getElementById('loading').style.display = 'none';
    const mainWrap = document.getElementById('main-wrap');
    mainWrap.style.display = 'flex';

    // 오늘 날짜
    const now = new Date();
    document.getElementById('today-date').textContent =
      now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일 ('+['일','월','화','수','목','금','토'][now.getDay()]+'요일)';

    // 학급명
    const className = (DB_DATA.settings||{}).className || '우리반';
    document.getElementById('class-name').textContent = className;

    renderTable();

  } catch(e) {
    alert('서버 연결 실패: ' + e.message);
  }
};

function normalizeData(data) {
  if (!data) return null;
  data.students   = toArr(data.students).filter(Boolean).map(s => ({
    ...s,
    pendingRewards: toArr(s.pendingRewards),
  }));
  // 중복 학생 제거
  const seenIds = new Map();
  data.students.forEach(s => seenIds.set(s.id, s));
  data.students = Array.from(seenIds.values());
  data.boardQuests = toArr(data.boardQuests);
  // questLogs 단일 소스 (student/admin과 동일 방식)
  data.quests = Object.values(data.questLogs || {})
    .filter(q => q != null && typeof q === 'object' && q.studentId);
  data.questLogs = data.quests; // 하위 호환
  return data;
}

// ── 탭 전환 ──
// ── 테이블 렌더 ──
function renderTable() {
  if (!DB_DATA) return;
  const students  = DB_DATA.students || [];
  const allQuests = DB_DATA.quests || [];
  const el = document.getElementById('kiosk-content');

  const today = new Date(Date.now()+9*3600000).toISOString().slice(0,10);
  const weekStart = (() => {
    const d=new Date(Date.now()+9*3600000);
    const day=d.getUTCDay();
    const sun=new Date(d);
    sun.setUTCDate(d.getUTCDate()-day);
    return sun.toISOString().slice(0,10);
  })();

  const allActive = (DB_DATA.boardQuests||[]).filter(q => q.active!==false);
  const activeBQIds = new Set(allActive.map(q=>q.id));

  function getStatus(studentId, questId, questType) {
    const s = students.find(x=>x.id===studentId);
    if (!s) return 'none';
    if (!activeBQIds.has(questId)) return 'none';
    const done = allQuests.filter(Boolean).some(q => {
      if (!q || q.studentId!==studentId || q.boardQuestId!==questId) return false;
      if (!q.date) return true;
      if (questType==='daily')  return q.date===today;
      if (questType==='weekly') return q.date>=weekStart;
      return true;
    });
    if (done) return 'done';
    if ((s.pendingRewards||[]).some(r => r && r.boardQuestId===questId && r.approved===true)) return 'done';
    if ((s.pendingRewards||[]).some(r => r && r.boardQuestId===questId && !r.approved)) return 'pending';
    return 'none';
  }

  // 섹션 정의
  const sections = [
    { type:'daily',   label:'📋 일일 퀘스트', color:'rgba(74,144,226,.15)',  border:'rgba(74,144,226,.3)' },
    { type:'weekly',  label:'📅 주간 퀘스트', color:'rgba(46,204,113,.12)',  border:'rgba(46,204,113,.3)' },
    { type:'special', label:'✏️ 과제',        color:'rgba(255,215,0,.1)',    border:'rgba(255,215,0,.3)'  },
    { type:'event',   label:'⭐ 특별 퀘스트', color:'rgba(155,89,182,.12)', border:'rgba(155,89,182,.3)' },
  ];

  let totalHtml = '';
  let hasAny = false;

  sections.forEach(sec => {
    const quests = allActive.filter(q => q.type === sec.type);
    if (quests.length === 0) return;
    hasAny = true;

    // 섹션 헤더
    totalHtml += `
      <div style="font-size:.9rem;font-weight:900;color:var(--gold);
        padding:.5rem .8rem;margin-top:.6rem;background:${sec.color};
        border-left:3px solid ${sec.border};border-radius:0 8px 8px 0;">
        ${sec.label}
      </div>`;

    // 테이블
    totalHtml += `<table id="kiosk-table" style="margin-bottom:.3rem">
      <thead><tr>
        <th class="quest-th">할 일</th>
        ${students.map(s=>`<th style="font-size:.8rem">
          <div style="font-size:1.2rem">${s.avatar}</div>
          <div style="font-size:.72rem;margin-top:2px">${s.name}</div>
        </th>`).join('')}
      </tr></thead>
      <tbody>`;

    quests.forEach(q => {
      totalHtml += `<tr>
        <td class="quest-name">
          <div>${q.icon||'📋'} ${q.name}</div>
          <div class="quest-reward">+${q.exp}EXP · +${q.gold}G</div>
          ${(()=>{
            const info=getDeadlineInfo(q);
            if(!info) return '';
            const color = info.urgent==='expired'?'#999':info.urgent==='critical'?'#ff4444':info.urgent==='warning'?'#ffaa00':'var(--txt2)';
            const prefix = info.urgent==='critical'?'🔴 ':info.urgent==='warning'?'🟡 ':'⏰ ';
            const suffix = info.urgent==='critical'?' — 곧 마감!':info.urgent==='warning'?' — 임박!':'';
            return `<div style="font-size:.66rem;color:${color};margin-top:.15rem;font-weight:${info.urgent?'700':'400'}">${prefix}${info.deadline}까지${suffix}</div>`;
          })()}
        </td>`;

      students.forEach(s => {
        const status = getStatus(s.id, q.id, q.type);
        if (status === 'done') {
          totalHtml += `<td><div class="cell-btn done">✓<span style="font-size:.6rem">완료</span></div></td>`;
        } else if (status === 'pending') {
          totalHtml += `<td><div class="cell-btn pending" onclick="requestCancel('${s.id}','${q.id}','${s.name}','${q.name}')">

    });

    totalHtml += '</tbody></table>';
  });

  if (!hasAny) {
    el.innerHTML = `<div id="empty-msg">
      <div style="font-size:3rem">📭</div>
      <div style="font-size:1rem;font-weight:700">등록된 퀘스트가 없어요</div>
      <div style="font-size:.82rem">선생님이 퀘스트를 올리면 여기에 표시됩니다</div>
    </div>`;
    return;

  el.innerHTML = totalHtml;

            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

// ── 키오스크 감정 입력 팝업 ──
let _kEmoStudentId = null, _kEmoPeriod = null;
let _kEmoKey = null, _kEmoLevel = null;

function openKioskEmotion(studentId, period) {
  _kEmoStudentId = studentId; _kEmoPeriod = period;
  _kEmoKey = null; _kEmoLevel = null;

  const today = new Date(Date.now()+9*3600000).toISOString().slice(0,10);
  const existing = (DB_DATA?.emotionLogs || {})[`${studentId}_${today}_${period}`] || null;
  const s = (DB_DATA.students||[]).find(x=>x.id===studentId);
  const label = period==='am'?'🌅 오전':'🌇 오후';

  let pop = document.getElementById('kiosk-emo-popup');
  if (!pop) {
    pop = document.createElement('div');
    pop.id = 'kiosk-emo-popup';
    pop.style.cssText = 'position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center';
    document.body.appendChild(pop);
  }

  pop.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:20px;
      padding:1.2rem;width:90%;max-width:460px;max-height:90vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem">
        <div style="font-weight:700">${s?.avatar} ${s?.name} · ${label}</div>
        <button onclick="document.getElementById('kiosk-emo-popup').style.display='none'"
          style="background:none;border:none;color:var(--txt2);font-size:1.2rem;cursor:pointer">✕</button>
      </div>
      <!-- 감정 그리드 -->
      <div id="k-emo-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:.4rem;margin-bottom:.8rem">
        ${EMOTION_DATA.map(e => `
          <button onclick="kSelectEmotion('${e.key}')"
            id="ke-${e.key}"
            style="display:flex;flex-direction:column;align-items:center;gap:2px;
              padding:.5rem .2rem;border-radius:10px;cursor:pointer;font-family:inherit;
              border:1.5px solid ${existing?.emotionKey===e.key?'var(--gold)':'rgba(255,255,255,.1)'};
              background:${existing?.emotionKey===e.key?'rgba(255,215,0,.12)':'rgba(255,255,255,.04)'}">
            <span style="font-size:1.3rem">${e.icon}</span>
            <span style="font-size:.58rem;color:var(--txt2)">${e.label}</span>
          </button>`).join('')}
      </div>
      <!-- 강도 -->
      <div id="k-emo-level-wrap" style="display:none;margin-bottom:.8rem">
        <div style="font-size:.8rem;color:var(--txt2);margin-bottom:.4rem">얼마나 그런가요?</div>
        <div style="display:flex;gap:.5rem">
          ${[1,2,3].map(v=>`<button id="k-elv-${v}" onclick="kSelectLevel(${v})"
            style="flex:1;padding:.5rem;border-radius:10px;cursor:pointer;font-family:inherit;
              border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);
              color:var(--txt);font-size:.85rem">${['조금','보통','많이'][v-1]}</button>`).join('')}
        </div>
      </div>
      <!-- 이유 -->
      <div id="k-emo-reason-wrap" style="display:none">
        <input id="k-emo-reason" placeholder="이유 (선택사항)"
          style="width:100%;padding:.6rem .8rem;border-radius:10px;
            background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);
            color:var(--txt);font-size:.85rem;font-family:inherit;margin-bottom:.5rem">
        <div style="display:flex;gap:.5rem">
          <button onclick="kSubmitEmotion('')"
            style="flex:1;padding:.55rem;border-radius:10px;cursor:pointer;font-family:inherit;
              border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:var(--txt)">없음</button>
          <button id="k-emo-submit" onclick="kSubmitEmotion(document.getElementById('k-emo-reason').value)"
            style="flex:2;padding:.55rem;border-radius:10px;cursor:pointer;font-family:inherit;
              background:var(--gold);color:#1a1a1a;border:none;font-weight:700" disabled>저장</button>
        </div>
      </div>
    </div>`;
  pop.style.display = 'flex';
}

function kSelectEmotion(key) {
  _kEmoKey = key;
  // 선택 표시
  EMOTION_DATA.forEach(e => {
    const btn = document.getElementById('ke-'+e.key);
    if (!btn) return;
    btn.style.border = e.key===key ? '1.5px solid var(--gold)' : '1.5px solid rgba(255,255,255,.1)';
    btn.style.background = e.key===key ? 'rgba(255,215,0,.12)' : 'rgba(255,255,255,.04)';
  });
  document.getElementById('k-emo-level-wrap').style.display  = '';
  document.getElementById('k-emo-reason-wrap').style.display = 'none';
  _kEmoLevel = null;
  [1,2,3].forEach(v => {
    const b = document.getElementById('k-elv-'+v);
    if (b) { b.style.background='rgba(255,255,255,.04)'; b.style.borderColor='rgba(255,255,255,.15)'; }
  });
}

function kSelectLevel(level) {
  _kEmoLevel = level;
  [1,2,3].forEach(v => {
    const b = document.getElementById('k-elv-'+v);
    if (!b) return;
    b.style.background   = v===level ? 'var(--gold)' : 'rgba(255,255,255,.04)';
    b.style.color        = v===level ? '#1a1a1a'     : 'var(--txt)';
    b.style.borderColor  = v===level ? 'var(--gold)' : 'rgba(255,255,255,.15)';
  });
  document.getElementById('k-emo-reason-wrap').style.display = '';
  document.getElementById('k-emo-submit').disabled = false;
}

function kSubmitEmotion(reason) {
  if (!_kEmoKey || !_kEmoLevel) { return; }
  const today = new Date(Date.now()+9*3600000).toISOString().slice(0,10);
  const e = EMOTION_DATA.find(x => x.key === _kEmoKey);
  const key = `${_kEmoStudentId}_${today}_${_kEmoPeriod}`;
  const record = {
    id: key, studentId: _kEmoStudentId, date: today, period: _kEmoPeriod,
    emotionKey: _kEmoKey, emotionLabel: e.label, emotionIcon: e.icon, group: e.group,
    level: _kEmoLevel, levelLabel: ['조금','보통','많이'][_kEmoLevel-1],
    score: EMOTION_GROUP_VALUE[e.group] * _kEmoLevel,
    reason: reason.trim() || '없음', updatedAt: Date.now(),
  };
  fbRef.child('emotionLogs/' + key).set(record);
  document.getElementById('kiosk-emo-popup').style.display = 'none';
  renderEmotionBoard();
}

// ── 퀘스트 신청 ──
function weekStart2() {
  const d=new Date(Date.now()+9*3600000); const day=d.getUTCDay();
  const mon=new Date(d); mon.setDate(d.getDate()-(day===0?6:day-1));
  return mon.toISOString().slice(0,10);
}

function requestQuest(studentId, questId, btn) {
  // 1. UI 레벨 연타 방지 (즉시 잠금)
  if (btn?.dataset.requesting === '1') return;
  if (btn) btn.dataset.requesting = '1';

  const data = DB_DATA;
  const s = data.students.find(x=>x.id===studentId);
  const q = (data.boardQuests||[]).find(x=>x.id===questId);
  if (!s || !q) { if (btn) delete btn.dataset.requesting; return; }

  // 2. DB 기반 중복 체크
  const today2 = todayStr();
  const alreadyDone = (DB_DATA.quests||[]).some(x => x && x.studentId===studentId && x.boardQuestId===questId &&
    (q.type==='special' || q.type==='event' || (q.type==='daily'&&x.date===today2) || (q.type==='weekly'&&x.date>=weekStart2())));
  const alreadyPending = (s.pendingRewards||[]).some(r=>r && r.boardQuestId===questId);
  if (alreadyDone || alreadyPending) {
    if (btn) delete btn.dataset.requesting; // 중복이면 잠금 해제
    return;
  }

  s.pendingRewards = s.pendingRewards || [];
  s.pendingRewards.push({
    id: 'pr_'+Date.now()+'_'+studentId,
    boardQuestId: questId,
    boardQuestType: q.type||'special',
    label: q.name,
    exp: q.exp, gold: q.gold,
    stat: q.stat||'', statVal: q.stat?1:0,
    icon: q.icon||'📋',
    date: todayStr(),
  });

  // Firebase 저장 (id 키 기반 - 인덱스 충돌 없음)
  fbRef.child('students/'+s.id).set(s)
    .then(() => { /* 저장 성공 - renderTable()로 리렌더되므로 별도 해제 불필요 */ })
    .catch(() => { if (btn) delete btn.dataset.requesting; }); // 실패 시 잠금 해제
  showToast(`✅ ${s.name} · ${q.name} 신청 완료!`);
}

// ── 신청 취소 확인 팝업 ──
function requestCancel(studentId, questId, studentName, questName) {
  document.getElementById('cancel-popup-sub').textContent =
    `${studentName} · ${questName}`;
  _cancelCb = () => cancelQuest(studentId, questId);
  document.getElementById('cancel-confirm-btn').onclick = () => {
    _cancelCb && _cancelCb();
    closeCancelPopup();
  };
  document.getElementById('cancel-popup').style.display = 'flex';
}

function closeCancelPopup() {
  document.getElementById('cancel-popup').style.display = 'none';
  _cancelCb = null;
}

function cancelQuest(studentId, questId) {
  const data = DB_DATA;
  const s = data.students.find(x=>x.id===studentId);
  if (!s) return;
  s.pendingRewards = (s.pendingRewards||[]).filter(r=>r.boardQuestId!==questId);
  const canIdx = DB_DATA.students.findIndex(x=>x.id===studentId);
  if (canIdx >= 0) fbRef.child('students/'+s.id).set(s);
  showToast('↩️ 신청이 취소됐어요');
}


// ── 마감일 계산 + 임박 여부 ──
function getDeadlineInfo(quest) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fmt = d => d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());

  let deadline = null;
  let deadlineTime = null;

  if (quest.type === 'daily') {
    // 오늘 오후 4시 (방과후)
    deadlineTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 15, 0, 0);
    deadline = fmt(now) + ' 방과후';
  } else if (quest.type === 'weekly') {
    const day = now.getDay();
    const diff = day <= 5 ? 5 - day : 6;
    const fri = new Date(now);
    fri.setDate(now.getDate() + diff);
    deadlineTime = new Date(fri.getFullYear(), fri.getMonth(), fri.getDate(), 16, 0, 0);
    deadline = fmt(fri) + ' 방과후';
  } else if (quest.dueDate) {
    deadline = quest.dueDate;
    deadlineTime = new Date(quest.dueDate + 'T16:00:00');
  }

  if (!deadline) return null;

  const diffMs = deadlineTime ? deadlineTime - now : null;
  const diffHr = diffMs ? diffMs / 3600000 : null;

  let urgent = null;
  if (diffHr !== null) {
    if (diffHr < 0)       urgent = 'expired';   // 마감 지남
    else if (diffHr < 1)  urgent = 'critical';  // 1시간 미만
    else if (diffHr < 3)  urgent = 'warning';   // 3시간 미만
  }

  return { deadline, urgent, diffHr };
}

// 구버전 호환
function getDeadline(quest) {
  const info = getDeadlineInfo(quest);
  return info ? info.deadline : null;
}
// ── 토스트 ──
let _toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.style.display='none'; }, 2000);
}
</script>
