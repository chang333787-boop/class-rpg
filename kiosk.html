<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>우리반 할 일 체크판</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link rel="stylesheet" href="./kiosk.css?v=20260604">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- 로딩 -->
<div id="loading">
  <div style="font-size:3rem">🏫</div>
  <div style="font-size:1rem;font-weight:700;color:var(--gold)">우리반 할 일 체크판</div>
  <div style="font-size:.8rem;color:#8899aa">서버에 연결하는 중...</div>
  <div style="width:180px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:.5rem;overflow:hidden">
    <div style="width:40%;height:100%;background:var(--gold);border-radius:2px;animation:ldBar 1.2s ease-in-out infinite"></div>
  </div>
</div>

<!-- 취소 확인 팝업 -->
<div id="cancel-popup">
  <div class="popup-box">
    <div class="popup-title">신청을 취소할까요?</div>
    <div class="popup-sub" id="cancel-popup-sub"></div>
    <div class="popup-btns">
      <button style="background:rgba(255,255,255,.1);color:var(--txt)" onclick="closeCancelPopup()">아니요</button>
      <button style="background:var(--red);color:#fff" id="cancel-confirm-btn">취소하기</button>
    </div>
  </div>
</div>

<!-- 메인 -->
<div id="main-wrap" style="display:none;width:100%">
  <div id="header">
    <div class="title">우리반 할 일</div>
    <div id="class-name" style="font-size:.78rem;color:var(--txt2)"></div>
    <div style="display:flex;gap:.4rem;margin-left:auto">
      <button id="kiosk-tab-quest" onclick="switchKioskTab('quest')"
        style="font-size:.82rem;padding:.35rem .9rem;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:700;
          background:var(--gold);color:#1a1a1a;border:none">📋 퀘스트</button>
      <button id="kiosk-tab-emotion" onclick="switchKioskTab('emotion')"
        style="font-size:.82rem;padding:.35rem .9rem;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:700;
          background:transparent;color:var(--txt2);border:1.5px solid rgba(255,255,255,.25)">💭 감정</button>
      <button id="kiosk-tab-memory" onclick="switchKioskTab('memory')"
        style="font-size:.82rem;padding:.35rem .9rem;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:700;
          background:transparent;color:var(--txt2);border:1.5px solid rgba(255,255,255,.25)">📸 추억</button>
    </div>
    <div class="date" id="today-date"></div>
  </div>
  <!-- 퀘스트 탭 -->
  <div id="table-wrap" style="flex:1;overflow-y:auto;overflow-x:auto;padding:.6rem .8rem 8rem;-webkit-overflow-scrolling:touch;min-height:0">
    <div id="kiosk-content"></div>
  </div>
  <!-- 감정 탭 -->
  <div id="kiosk-emotion-wrap" style="display:none;flex:1;overflow-y:auto;padding:.6rem .8rem 8rem;-webkit-overflow-scrolling:touch;min-height:0">
    <div id="kiosk-emotion-content"></div>
  </div>
  <!-- 추억 탭 -->
  <div id="kiosk-memory-wrap" style="display:none;flex:1;overflow-y:auto;padding:.6rem .8rem 8rem;-webkit-overflow-scrolling:touch;min-height:0">
    <div id="kiosk-memory-content"></div>
  </div>
</div>

<div id="toast"></div>


<script src="./gamedata.js?v=20260702"></script>

<script src="./kiosk.js?v=20260702"></script>
</body>
</html>
